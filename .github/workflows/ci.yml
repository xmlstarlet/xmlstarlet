# XMLStarlet CI
#
# Goal: document the *actual* build/test envelope of the current source
# across the combinations of libxml2, libxslt, compiler and OS that matter.
#
# The libxml2/libxslt job builds each dependency version from source and runs
# `make check` against it. Every released version the source supports is
# required (must stay green), from the oldest (2.6.27) to the newest. Only
# `libxml2 git` - upstream master HEAD, which can break at any time from
# unreleased changes - stays `experimental` (continue-on-error): it's the early
# warning, and would be promoted once a change it flags is released and handled.
#
# xmlstarlet's configure.ac declares the minimum as libxml2 >= 2.6.27 (libxslt
# >= 1.1.9), and configure hard-rejects anything older (verified: 2.6.26 ->
# "xmlstarlet needs at least libxml version 2.6.27"). The matrix confirms 2.6.27
# (declared minimum) and 2.6.30 (last 2.6) build and pass the core suite, but
# schema/RelaxNG validation, --html and -R recover crash on that vintage - so
# full functionality needs a newer libxml2.

name: CI

on:
  push:
    branches: [master, ci, "ci/**"]
  pull_request:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to test (branch/tag/sha); blank = the branch this run is launched from"
        required: false

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Flagship axis: build against many libxml2 / libxslt versions from source.
  # ---------------------------------------------------------------------------
  libxml2:
    name: libxml2 ${{ matrix.libxml2 }}
    runs-on: ubuntu-24.04
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # xmlstarlet's configure.ac declares libxml2 >= 2.6.27. The declared
          # minimum and the last 2.6 release both build and pass the core suite
          # (including the stdin "-" tests). 2.6.x-vintage schema/RelaxNG
          # validation, --html and -R recover crash - those five tests are
          # marked XFAIL (see the Test step), so the jobs report green with a
          # note rather than a red. oldxml also drives the old-libxml2 build
          # workarounds in "Build libxml2 + libxslt". Required: a regression that
          # makes one of the five pass (XPASS) or newly fail then blocks.
          - { libxml2: "2.6.27",  libxslt: "1.1.26", experimental: false, oldxml: true }
          - { libxml2: "2.6.30",  libxslt: "1.1.26", experimental: false, oldxml: true }
          - { libxml2: "2.7.8",   libxslt: "1.1.26", experimental: false }
          - { libxml2: "2.8.0",   libxslt: "1.1.28", experimental: false }
          - { libxml2: "2.9.14",  libxslt: "1.1.35", experimental: false }
          - { libxml2: "2.10.4",  libxslt: "1.1.37", experimental: false }
          - { libxml2: "2.11.9",  libxslt: "1.1.39", experimental: false }
          - { libxml2: "2.12.10", libxslt: "1.1.42", experimental: false }
          - { libxml2: "2.13.8",  libxslt: "1.1.42", experimental: false }
          - { libxml2: "2.14.5",  libxslt: "1.1.43", experimental: false }
          - { libxml2: "2.15.3",  libxslt: "1.1.43", experimental: false }
          # git = upstream master HEAD; the only experimental (non-blocking) job.
          - { libxml2: "git",     libxslt: "git",    experimental: true }
    env:
      PREFIX: ${{ github.workspace }}/deps
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0   # need tags for git describe -> version.h

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential autoconf automake libtool pkg-config \
            wget xz-utils ca-certificates git

      - name: Cache libxml2 + libxslt (${{ matrix.libxml2 }}/${{ matrix.libxslt }})
        if: matrix.libxml2 != 'git'
        id: deps-cache
        uses: actions/cache@v6
        with:
          path: ${{ env.PREFIX }}
          key: deps-libxml2-${{ matrix.libxml2 }}-libxslt-${{ matrix.libxslt }}

      - name: Build libxml2 + libxslt
        if: matrix.libxml2 == 'git' || steps.deps-cache.outputs.cache-hit != 'true'
        run: |
          set -eux
          mkdir -p "$PREFIX/src"
          cd "$PREFIX/src"

          if [ "${{ matrix.libxml2 }}" = "git" ]; then
            git clone --depth 1 https://gitlab.gnome.org/GNOME/libxml2.git
            ( cd libxml2 && ./autogen.sh --prefix="$PREFIX" --without-python \
                && make -j"$(nproc)" && make install )
            git clone --depth 1 https://gitlab.gnome.org/GNOME/libxslt.git
            ( cd libxslt && ./autogen.sh --prefix="$PREFIX" \
                --with-libxml-prefix="$PREFIX" --without-python \
                && make -j"$(nproc)" && make install )
          else
            xml2="${{ matrix.libxml2 }}"; xml2_series="${xml2%.*}"
            if [ "${{ matrix.oldxml }}" = "true" ]; then
              # pre-2.7 releases ship .tar.gz only; their nanohttp/nanoftp call
              # open(O_CREAT) with 2 args, which modern glibc fortify rejects, so
              # drop the network modules (xmlstarlet uses neither); and force
              # pre-C23 prototype semantics for the weak pthread stubs in
              # threads.c that otherwise conflict with the real prototypes.
              wget -q "https://download.gnome.org/sources/libxml2/${xml2_series}/libxml2-${xml2}.tar.gz"
              tar xf "libxml2-${xml2}.tar.gz"
              ( cd "libxml2-${xml2}" && ./configure --prefix="$PREFIX" --without-python \
                  --without-http --without-ftp CFLAGS="-O2 -std=gnu17" \
                  && make -j"$(nproc)" && make install )
            else
              wget -q "https://download.gnome.org/sources/libxml2/${xml2_series}/libxml2-${xml2}.tar.xz"
              tar xf "libxml2-${xml2}.tar.xz"
              ( cd "libxml2-${xml2}" && ./configure --prefix="$PREFIX" --without-python \
                  && make -j"$(nproc)" && make install )
            fi

            xslt="${{ matrix.libxslt }}"; xslt_series="${xslt%.*}"
            wget -q "https://download.gnome.org/sources/libxslt/${xslt_series}/libxslt-${xslt}.tar.xz"
            tar xf "libxslt-${xslt}.tar.xz"
            ( cd "libxslt-${xslt}" && ./configure --prefix="$PREFIX" \
                --with-libxml-prefix="$PREFIX" --without-python \
                && make -j"$(nproc)" && make install )
          fi

      - name: Configure xmlstarlet
        run: |
          set -eux
          autoreconf -fi
          ./configure \
            --disable-build-docs --enable-werror \
            LIBXML_CONFIG="$PREFIX/bin/xml2-config" \
            LIBXSLT_CONFIG="$PREFIX/bin/xslt-config" \
            LDFLAGS="-Wl,-rpath,$PREFIX/lib"

      # These jobs configure with --disable-build-docs, so INSTALL_DOCS is off
      # and `make` builds only the binary. Documentation is generated
      # separately (it needs docbook-xsl).
      - name: Build
        run: make -j"$(nproc)"

      - name: Test
        run: |
          if [ "${{ matrix.oldxml }}" = "true" ]; then
            # libxml2 2.6.x crashes in schema/RelaxNG validation, --html and -R
            # recover - pre-existing limitations of that vintage, not xmlstarlet
            # regressions. Mark exactly those expected-fail on top of the suite's
            # own XFAIL_TESTS so the run is green; if one starts passing again it
            # surfaces as XPASS (which fails the job).
            base=$(make -pn 2>/dev/null | sed -n 's/^XFAIL_TESTS = //p' | head -1)
            make check XFAIL_TESTS="$base \
              examples/bigxml-xsd examples/hello1 examples/recover1 \
              examples/schema1 examples/valid1"
          else
            make check
          fi

      - name: Report test results
        if: always()
        shell: bash
        env:
          LABEL: libxml2 ${{ matrix.libxml2 }} / libxslt ${{ matrix.libxslt }}
          OLDXML: ${{ matrix.oldxml }}
        run: |
          log=test-suite.log
          if [ ! -f "$log" ]; then
            echo "- :warning: **${LABEL}** — build failed, no tests run" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          n() { sed -n "s/^# $1:[[:space:]]*//p" "$log" | head -1; }
          T=$(n TOTAL); P=$(n PASS); S=$(n SKIP); XF=$(n XFAIL); F=$(n FAIL); XP=$(n XPASS); E=$(n ERROR)
          NOTE=""
          if [ "${F:-0}" != 0 ] || [ "${E:-0}" != 0 ] || [ "${XP:-0}" != 0 ]; then
            I=":x:"
          elif [ "${OLDXML}" = "true" ]; then
            I=":grey_exclamation:"
            NOTE=" — expected: 5 XFAIL are pre-existing libxml2 2.6.x crashes (schema/RelaxNG/--html/-R), not regressions"
          else
            I=":white_check_mark:"
          fi
          echo "- ${I} **${LABEL}** — total ${T:-?}, pass ${P:-0}, fail ${F:-0}, xfail ${XF:-0}, xpass ${XP:-0}, skip ${S:-0}, error ${E:-0}${NOTE}" >> "$GITHUB_STEP_SUMMARY"
          if [ "${I}" = ":x:" ]; then
            grep -E "^(FAIL|ERROR|XPASS):" "$log" | sed "s/^/  - /" >> "$GITHUB_STEP_SUMMARY" || true
          fi

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: testlogs-libxml2-${{ matrix.libxml2 }}
          path: |
            test-suite.log
            examples/*.log
            examples/*.trs
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Compiler axis: vary the compiler against a pinned, from-source libxml2 so
  # the compiler is the only variable. The runner's system libxml2 varies by
  # image (2.9 on 22.04/24.04, 2.15 on 26.04), which would confound the result.
  # ---------------------------------------------------------------------------
  compilers:
    name: ${{ matrix.cc }}
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}
    env:
      PREFIX: ${{ github.workspace }}/deps
      LIBXML2: "2.15.3"    # pinned baseline (newest stable) so the compiler is the only variable
      LIBXSLT: "1.1.43"
    strategy:
      fail-fast: false
      matrix:
        include:
          # gcc 9-11 on 22.04, 12-14 on 24.04, 15-16 on 26.04 (gcc-16 from
          # 26.04 universe - native, no PPA). All required. NB 26.04 is still a
          # preview image, so gcc-15/16 can flake on runner availability. clang
          # is required too now the const callback signatures match libxml2.
          - { os: ubuntu-22.04, cc: gcc-9,  experimental: false }
          - { os: ubuntu-22.04, cc: gcc-10, experimental: false }
          - { os: ubuntu-22.04, cc: gcc-11, experimental: false }
          - { os: ubuntu-24.04, cc: gcc-12, experimental: false }
          - { os: ubuntu-24.04, cc: gcc-13, experimental: false }
          - { os: ubuntu-24.04, cc: gcc-14, experimental: false }
          - { os: ubuntu-26.04, cc: gcc-15, experimental: false }
          - { os: ubuntu-26.04, cc: gcc-16, experimental: false }
          - { os: ubuntu-24.04, cc: clang,  experimental: false }
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0   # need tags for git describe -> version.h
      - name: Install build tools + compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential autoconf automake libtool pkg-config \
            wget xz-utils ca-certificates ${{ matrix.cc }}
      - name: Cache libxml2 + libxslt (${{ env.LIBXML2 }}/${{ env.LIBXSLT }})
        id: deps-cache
        uses: actions/cache@v6
        with:
          path: ${{ env.PREFIX }}
          key: deps-${{ matrix.os }}-libxml2-${{ env.LIBXML2 }}-libxslt-${{ env.LIBXSLT }}
      - name: Build pinned libxml2 + libxslt
        if: steps.deps-cache.outputs.cache-hit != 'true'
        run: |
          set -eux
          mkdir -p "$PREFIX/src"
          cd "$PREFIX/src"
          wget -q "https://download.gnome.org/sources/libxml2/${LIBXML2%.*}/libxml2-${LIBXML2}.tar.xz"
          tar xf "libxml2-${LIBXML2}.tar.xz"
          ( cd "libxml2-${LIBXML2}" && ./configure --prefix="$PREFIX" --without-python \
              && make -j"$(nproc)" && make install )
          wget -q "https://download.gnome.org/sources/libxslt/${LIBXSLT%.*}/libxslt-${LIBXSLT}.tar.xz"
          tar xf "libxslt-${LIBXSLT}.tar.xz"
          ( cd "libxslt-${LIBXSLT}" && ./configure --prefix="$PREFIX" \
              --with-libxml-prefix="$PREFIX" --without-python \
              && make -j"$(nproc)" && make install )
      - name: Build + test
        env:
          CC: ${{ matrix.cc }}
        run: |
          set -eux
          autoreconf -fi
          ./configure --disable-build-docs --enable-werror \
            LIBXML_CONFIG="$PREFIX/bin/xml2-config" \
            LIBXSLT_CONFIG="$PREFIX/bin/xslt-config" \
            LDFLAGS="-Wl,-rpath,$PREFIX/lib"
          make -j"$(nproc)"
          make check

      - name: Report test results
        if: always()
        shell: bash
        env:
          LABEL: ${{ matrix.cc }}
        run: |
          log=test-suite.log
          if [ ! -f "$log" ]; then
            echo "- :warning: **${LABEL}** — build failed, no tests run" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          n() { sed -n "s/^# $1:[[:space:]]*//p" "$log" | head -1; }
          T=$(n TOTAL); P=$(n PASS); S=$(n SKIP); XF=$(n XFAIL); F=$(n FAIL); XP=$(n XPASS); E=$(n ERROR)
          if [ "${F:-0}" = 0 ] && [ "${E:-0}" = 0 ] && [ "${XP:-0}" = 0 ]; then I=":white_check_mark:"; else I=":x:"; fi
          echo "- ${I} **${LABEL}** — total ${T:-?}, pass ${P:-0}, fail ${F:-0}, xfail ${XF:-0}, xpass ${XP:-0}, skip ${S:-0}, error ${E:-0}" >> "$GITHUB_STEP_SUMMARY"
          if [ "${I}" = ":x:" ]; then
            grep -E "^(FAIL|ERROR|XPASS):" "$log" | sed "s/^/  - /" >> "$GITHUB_STEP_SUMMARY" || true
          fi

  # ---------------------------------------------------------------------------
  # OS axis: build against each platform's own libxml2/libxslt (Linux from the
  # distro, macOS from Homebrew - currently 2.15). All required.
  # ---------------------------------------------------------------------------
  os:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-24.04,     experimental: false }
          - { os: ubuntu-24.04-arm, experimental: false }  # aarch64
          - { os: macos-latest,     experimental: false }
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0   # need tags for git describe -> version.h
      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential autoconf automake libtool pkg-config \
            libxml2-dev libxslt1-dev
      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: |
          # Drop the runner's preinstalled, untrusted aws/tap so brew does not
          # emit a tap-trust warning; we only use homebrew/core formulae.
          brew untap aws/tap 2>/dev/null || true
          brew install autoconf automake libtool pkg-config libxml2 libxslt
      - name: Build + test
        run: |
          set -eux
          if [ "$RUNNER_OS" = macOS ]; then
            xml2cfg="$(brew --prefix libxml2)/bin/xml2-config"
            xsltcfg="$(brew --prefix libxslt)/bin/xslt-config"
          else
            xml2cfg=/usr/bin/xml2-config
            xsltcfg=/usr/bin/xslt-config
          fi
          autoreconf -fi
          ./configure --disable-build-docs --enable-werror \
            LIBXML_CONFIG="$xml2cfg" LIBXSLT_CONFIG="$xsltcfg"
          make -j"$(sysctl -n hw.ncpu 2>/dev/null || nproc)"
          make check

      - name: Report test results
        if: always()
        shell: bash
        env:
          LABEL: ${{ matrix.os }}
        run: |
          log=test-suite.log
          if [ ! -f "$log" ]; then
            echo "- :warning: **${LABEL}** — build failed, no tests run" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          n() { sed -n "s/^# $1:[[:space:]]*//p" "$log" | head -1; }
          T=$(n TOTAL); P=$(n PASS); S=$(n SKIP); XF=$(n XFAIL); F=$(n FAIL); XP=$(n XPASS); E=$(n ERROR)
          if [ "${F:-0}" = 0 ] && [ "${E:-0}" = 0 ] && [ "${XP:-0}" = 0 ]; then I=":white_check_mark:"; else I=":x:"; fi
          echo "- ${I} **${LABEL}** — total ${T:-?}, pass ${P:-0}, fail ${F:-0}, xfail ${XF:-0}, xpass ${XP:-0}, skip ${S:-0}, error ${E:-0}" >> "$GITHUB_STEP_SUMMARY"
          if [ "${I}" = ":x:" ]; then
            grep -E "^(FAIL|ERROR|XPASS):" "$log" | sed "s/^/  - /" >> "$GITHUB_STEP_SUMMARY" || true
          fi

  # -------------------------------------------------------------------------
  # Cross-compilation axis: cross-build for aarch64, 32-bit arm and riscv64
  # with Ubuntu's native cross toolchains, then run the suite on the target
  # binaries via qemu-user-static (transparent binfmt). libxml2/libxslt are
  # cross-built from source at the pinned supported version, with the
  # configure workarounds cross-compiling xmlstarlet's autotools needs.
  # -------------------------------------------------------------------------
  cross:
    name: cross ${{ matrix.arch }}
    runs-on: ubuntu-24.04
    continue-on-error: ${{ matrix.experimental }}
    env:
      PREFIX: ${{ github.workspace }}/deps
      LIBXML2: "2.15.3"    # pinned baseline (newest stable) so the target arch is the only variable
      LIBXSLT: "1.1.43"
      QEMU_LD_PREFIX: /usr/${{ matrix.triplet }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: aarch64, triplet: aarch64-linux-gnu,   debarch: arm64,   experimental: false }
          - { arch: armhf,   triplet: arm-linux-gnueabihf, debarch: armhf,   experimental: false }
          - { arch: riscv64, triplet: riscv64-linux-gnu,   debarch: riscv64, experimental: false }
          # s390x is the one big-endian target - the whole matrix is otherwise
          # little-endian.
          - { arch: s390x,   triplet: s390x-linux-gnu,     debarch: s390x,   experimental: false }
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Install cross toolchain + qemu
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential autoconf automake libtool pkg-config \
            wget xz-utils ca-certificates \
            crossbuild-essential-${{ matrix.debarch }} qemu-user-static binfmt-support

      - name: Cache cross libxml2 + libxslt (${{ matrix.arch }})
        id: deps-cache
        uses: actions/cache@v6
        with:
          path: ${{ env.PREFIX }}
          key: deps-cross-${{ matrix.arch }}-libxml2-${{ env.LIBXML2 }}-libxslt-${{ env.LIBXSLT }}

      - name: Cross-build libxml2 + libxslt
        if: steps.deps-cache.outputs.cache-hit != 'true'
        env:
          CC: ${{ matrix.triplet }}-gcc
        run: |
          set -eux
          mkdir -p "$PREFIX/src"
          cd "$PREFIX/src"
          wget -q "https://download.gnome.org/sources/libxml2/${LIBXML2%.*}/libxml2-${LIBXML2}.tar.xz"
          tar xf "libxml2-${LIBXML2}.tar.xz"
          ( cd "libxml2-${LIBXML2}" && ./configure --host=${{ matrix.triplet }} \
              --prefix="$PREFIX" --without-python --without-zlib --without-lzma \
              && make -j"$(nproc)" && make install )
          wget -q "https://download.gnome.org/sources/libxslt/${LIBXSLT%.*}/libxslt-${LIBXSLT}.tar.xz"
          tar xf "libxslt-${LIBXSLT}.tar.xz"
          ( cd "libxslt-${LIBXSLT}" && ./configure --host=${{ matrix.triplet }} \
              --prefix="$PREFIX" --with-libxml-prefix="$PREFIX" --without-python --without-crypto \
              && make -j"$(nproc)" && make install )

      - name: Cross-build + test (qemu-user-static)
        env:
          CC: ${{ matrix.triplet }}-gcc
        run: |
          set -eux
          autoreconf -fi
          # cross: the malloc/realloc run-tests cannot execute, so seed their
          # cache results (xmlstarlet's configure requires this when cross).
          ./configure --host=${{ matrix.triplet }} --disable-build-docs --enable-werror \
            ac_cv_func_malloc_0_nonnull=yes ac_cv_func_realloc_0_nonnull=yes \
            LIBXML_CONFIG="$PREFIX/bin/xml2-config" \
            LIBXSLT_CONFIG="$PREFIX/bin/xslt-config" \
            LDFLAGS="-Wl,-rpath,$PREFIX/lib"
          make -j"$(nproc)"
          make check

      - name: Report test results
        if: always()
        shell: bash
        env:
          LABEL: cross ${{ matrix.arch }}
        run: |
          log=test-suite.log
          if [ ! -f "$log" ]; then
            echo "- :warning: **${LABEL}** — build failed, no tests run" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          n() { sed -n "s/^# $1:[[:space:]]*//p" "$log" | head -1; }
          T=$(n TOTAL); P=$(n PASS); S=$(n SKIP); XF=$(n XFAIL); F=$(n FAIL); XP=$(n XPASS); E=$(n ERROR)
          if [ "${F:-0}" = 0 ] && [ "${E:-0}" = 0 ] && [ "${XP:-0}" = 0 ]; then I=":white_check_mark:"; else I=":x:"; fi
          echo "- ${I} **${LABEL}** — total ${T:-?}, pass ${P:-0}, fail ${F:-0}, xfail ${XF:-0}, xpass ${XP:-0}, skip ${S:-0}, error ${E:-0}" >> "$GITHUB_STEP_SUMMARY"
          if [ "${I}" = ":x:" ]; then
            grep -E "^(FAIL|ERROR|XPASS):" "$log" | sed "s/^/  - /" >> "$GITHUB_STEP_SUMMARY" || true
          fi

  # -------------------------------------------------------------------------
  # Windows: native MinGW-w64 build through the runner's preinstalled MSYS2 -
  # the same toolchain SourceForge builds xml.exe with. No third-party action:
  # windows-latest ships C:\msys64.
  # -------------------------------------------------------------------------
  windows:
    name: windows (mingw64)
    runs-on: windows-latest
    continue-on-error: false
    env:
      MSYSTEM: MINGW64
      CHERE_INVOKING: "1"
    defaults:
      run:
        shell: C:\msys64\usr\bin\bash.exe -leo pipefail {0}
    steps:
      # actions/checkout uses the runner's Git, which defaults to
      # core.autocrlf=true; CRLF breaks the autotools and test shell scripts
      # under MSYS2, so force LF before checking out.
      - name: Keep LF line endings
        shell: pwsh
        run: git config --global core.autocrlf false

      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Install toolchain + deps (preinstalled MSYS2)
        run: |
          pacman --noconfirm -Sy
          pacman --noconfirm -S --needed \
            git autoconf automake libtool make \
            mingw-w64-x86_64-gcc mingw-w64-x86_64-libxml2 \
            mingw-w64-x86_64-libxslt mingw-w64-x86_64-pkgconf

      - name: Build
        run: |
          autoreconf -fi
          ./configure --disable-build-docs --enable-werror
          make -j"$(nproc)"

      - name: Test
        # MSYS2 rewrites arguments that look like POSIX paths into Windows paths
        # before calling the native xml.exe, which mangles absolute XPaths
        # (/xml/table/rec -> C:/msys64/xml/table/rec). Disable that conversion
        # for the test run; the build above still needs it for gcc's paths.
        env:
          MSYS2_ARG_CONV_EXCL: "*"
        run: make check

      - name: Report test results
        if: always()
        run: |
          log=test-suite.log
          if [ ! -f "$log" ]; then
            echo "- :warning: **windows (mingw64)** — build failed, no tests run" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          n() { sed -n "s/^# $1:[[:space:]]*//p" "$log" | head -1; }
          T=$(n TOTAL); P=$(n PASS); S=$(n SKIP); XF=$(n XFAIL); F=$(n FAIL); XP=$(n XPASS); E=$(n ERROR)
          if [ "${F:-0}" = 0 ] && [ "${E:-0}" = 0 ] && [ "${XP:-0}" = 0 ]; then I=":white_check_mark:"; else I=":x:"; fi
          echo "- ${I} **windows (mingw64)** — total ${T:-?}, pass ${P:-0}, fail ${F:-0}, xfail ${XF:-0}, xpass ${XP:-0}, skip ${S:-0}, error ${E:-0}" >> "$GITHUB_STEP_SUMMARY"
          if [ "${I}" = ":x:" ]; then
            grep -E "^(FAIL|ERROR|XPASS):" "$log" | sed "s/^/  - /" >> "$GITHUB_STEP_SUMMARY" || true
          fi

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: testlogs-windows-mingw64
          path: |
            test-suite.log
            examples/*.log
            examples/*.trs
          if-no-files-found: ignore

  # -------------------------------------------------------------------------
  # BSD + Solaris axis. The User Guide (s.1.3 "Supported Platforms") lists
  # FreeBSD/NetBSD and Solaris, but CI never proved them. Run each in a real
  # VM on the Linux runner via vmactions, building against the platform's own
  # packaged libxml2/libxslt (mirrors the `os` job). The Makefile is
  # automake-generated, so GNU make (gmake) is used inside the BSDs. On a test
  # failure the job prints test-suite.log to aid diagnosis.
  #
  # HP-UX and AIX are documented too but have no GitHub Actions runner or VM,
  # so they cannot be CI'd.
  # -------------------------------------------------------------------------
  freebsd:
    name: freebsd
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
      - uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          prepare: |
            pkg install -y git autoconf automake libtool pkgconf gmake libxml2 libxslt
          run: |
            set -eux
            autoreconf -fi
            ./configure --disable-build-docs --enable-werror \
              LIBXML_CONFIG="$(command -v xml2-config)" \
              LIBXSLT_CONFIG="$(command -v xslt-config)"
            gmake -j"$(sysctl -n hw.ncpu)"
            gmake check

  openbsd:
    name: openbsd
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
      - uses: vmactions/openbsd-vm@v1
        with:
          usesh: true
          # OpenBSD autoconf/automake are versioned and need the *_VERSION env
          # vars (set in run:); libxml2/libxslt packages are `libxml`/`libxslt`.
          prepare: |
            pkg_add -I git autoconf%2.71 automake%1.16 libtool gmake pkgconf libxml libxslt
          run: |
            set -eux
            export AUTOCONF_VERSION=2.71 AUTOMAKE_VERSION=1.16
            autoreconf -fi
            ./configure --disable-build-docs --enable-werror \
              LIBXML_CONFIG="$(command -v xml2-config)" \
              LIBXSLT_CONFIG="$(command -v xslt-config)"
            gmake
            gmake check \
              || { echo '=== test-suite.log ==='; cat test-suite.log; exit 1; }

  netbsd:
    name: netbsd
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
      - uses: vmactions/netbsd-vm@v1
        with:
          usesh: true
          prepare: |
            /usr/sbin/pkg_add git autoconf automake libtool gmake pkg-config libxml2 libxslt
          run: |
            set -eux
            autoreconf -fi
            # pkgsrc installs libxml2/libxslt under /usr/pkg/lib, which is NOT
            # on the default runtime linker path - without rpath the built xml
            # binary cannot load libxml2.so at runtime, so every test that runs
            # it yields empty stdout and the diff fails. xml2-config --prefix
            # (the reliable, issue-13-safe way) gives the right lib dir.
            ./configure --disable-build-docs --enable-werror \
              LIBXML_CONFIG="$(command -v xml2-config)" \
              LIBXSLT_CONFIG="$(command -v xslt-config)" \
              LDFLAGS="-Wl,-rpath,$(xml2-config --prefix)/lib"
            gmake
            gmake check \
              || { echo '=== test-suite.log ==='; cat test-suite.log; exit 1; }

  omnios:
    name: omnios (solaris/illumos)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
      - uses: vmactions/omnios-vm@v1
        with:
          # libxml2 (and xml2-config) ship in the OmniOS base image under /usr;
          # only libxslt and the autotools need installing. gcc14 and pkg-config
          # are the short OOCE names; the autotools use the core developer/build/*
          # stems.
          prepare: |
            pkg install gcc14 developer/build/autoconf developer/build/automake developer/build/libtool developer/build/gnu-make library/libxslt pkg-config
          run: |
            set -eux
            export PATH="/opt/ooce/bin:$PATH"
            autoreconf -fi
            ./configure --disable-build-docs --enable-werror CC=gcc \
              LIBXML_CONFIG="$(command -v xml2-config)" \
              LIBXSLT_CONFIG="$(command -v xslt-config)" \
              LDFLAGS="-Wl,-rpath,$(xml2-config --prefix)/lib"
            gmake
            gmake check \
              || { echo '=== test-suite.log ==='; cat test-suite.log; exit 1; }

  # -------------------------------------------------------------------------
  # musl libc axis: the whole matrix above is glibc. Alpine builds the same
  # source against musl, which can surface locale/printf/regex differences.
  # Beyond the documented platform list - a robustness add, experimental.
  # -------------------------------------------------------------------------
  musl:
    name: musl (alpine x86_64)
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: alpine.sh {0}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
      - uses: jirutka/setup-alpine@v1
        with:
          arch: x86_64
          packages: >
            build-base autoconf automake libtool pkgconf git
            libxml2-dev libxslt-dev
      - name: Build + test
        run: |
          set -eux
          autoreconf -fi
          ./configure --disable-build-docs --enable-werror
          make -j"$(nproc)"
          make check
